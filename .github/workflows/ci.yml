name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black isort
      - run: flake8 students/ --max-line-length=120 --ignore=E501,W503
      - run: black --check students/
      - run: isort --check-only students/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements/dev.txt
      - run: python -m pytest students/tests/ -v --tb=short
        env:
          DJANGO_SETTINGS_MODULE: student_management.settings.dev

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t student-management .
