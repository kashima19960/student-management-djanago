{% extends 'base.html' %}
{% block title %}数据导入导出{% endblock %}{% block page_title %}数据导入导出{% endblock %}
{% block content %}
<div class="row g-3">
<div class="col-md-6"><div class="card p-4">
<h6><i class="bi bi-upload"></i> 导入学生数据</h6>
<p class="text-muted small">上传 Excel 文件，第一行为表头：学号、姓名、年龄、专业、入学时间、毕业时间</p>
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<input type="file" name="file" accept=".xlsx,.xls" class="form-control mb-3" required>
<button class="btn btn-primary">开始导入</button>
</form></div></div>
<div class="col-md-6"><div class="card p-4">
<h6><i class="bi bi-download"></i> 导出学生数据</h6>
<p class="text-muted small">将所有学生信息导出为 Excel 文件</p>
<a href="{% url 'export_students' %}" class="btn btn-success"><i class="bi bi-file-earmark-excel"></i> 下载 Excel</a>
</div></div>
</div>
{% endblock %}
