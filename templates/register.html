{% extends 'base.html' %}
{% block title %}注册{% endblock %}
{% block page_title %}用户注册{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5"><div class="col-md-5"><div class="card p-4">
  <form method="post">{% csrf_token %}
    {% for field in form %}
      <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}</div>
    {% endfor %}
    <button type="submit" class="btn btn-primary w-100">注册</button>
  </form>
  <p class="text-center mt-3 mb-0"><a href="{% url 'login' %}">已有账号？登录</a></p>
</div></div></div>
{% endblock %}
