{% extends 'base.html' %}
{% block title %}成绩录入 - {{ course.name }}{% endblock %}{% block page_title %}成绩录入：{{ course.name }}{% endblock %}
{% block content %}
<div class="card p-4">
<form method="post">{% csrf_token %}
<table class="table"><thead><tr><th>学号</th><th>姓名</th><th>成绩（0-100）</th></tr></thead>
<tbody>{% for e in enrollments %}<tr>
<td>{{ e.student.student_id }}</td><td>{{ e.student.name }}</td>
<td><input type="number" name="score_{{ e.pk }}" class="form-control form-control-sm" min="0" max="100" step="0.1" value="{{ e.score|default_if_none:'' }}"></td>
</tr>{% endfor %}</tbody></table>
<button class="btn btn-primary">保存成绩</button>
<a href="{% url 'grade_list' %}" class="btn btn-outline-secondary ms-2">返回</a>
</form></div>
{% endblock %}
