{% extends 'base.html' %}
{% block title %}登录{% endblock %}
{% block page_title %}用户登录{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5"><div class="col-md-5"><div class="card p-4">
  <form method="post">{% csrf_token %}
    {% for field in form %}
      <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}</div>
    {% endfor %}
    <button type="submit" class="btn btn-primary w-100">登录</button>
  </form>
  <p class="text-center mt-3 mb-0"><a href="{% url 'register' %}">没有账号？注册</a></p>
</div></div></div>
{% endblock %}
